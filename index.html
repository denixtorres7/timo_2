<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timo Interactivo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <button onclick="navigator.vibrate && navigator.vibrate(500)">
  Probar vibración
</button>

  <!-- ESCENA -->
  <div id="scene">

    <!-- IMAGEN PRINCIPAL -->
    <img id="pageImage" src="assets/DP_01.png">

    <!-- CAPA SENSORIAL -->
    <div id="noise"></div>

    <!-- FLASH -->
    <div id="flash"></div>

    <!-- MENSAJE -->
    <div id="message">
      Desliza lentamente para ayudar a Timo a regularse
    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>

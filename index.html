<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timo interactivo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="app">

  <img id="fondo" src="" alt="Fondo de escena" />

  <div id="oscuridad"></div>
  <div id="ruido"></div>
  <div id="flash"></div>

  <img id="timo" class="personaje" src="" alt="Timo" />
  <img id="pelota" class="personaje oculto" src="" alt="Pelota" />
  <img id="mono" class="personaje oculto" src="" alt="Mono" />
  <img id="conejo" class="personaje oculto" src="" alt="Conejo" />
  <img id="pajaro" class="personaje oculto" src="" alt="Pájaro" />
  <img id="mariposa" class="personaje oculto" src="" alt="Mariposa" />

  <section id="texto">
    <h1 id="titulo"></h1>
    <p id="instruccion"></p>
    <p id="cuento"></p>
  </section>

  <nav id="menu">
    <button onclick="cargarEscena('portada')">🏠 Portada</button>
    <button onclick="cargarEscena('tunel')">🕳️ Túnel</button>
    <button onclick="cargarEscena('respiracion')">🌬️ Respirar</button>
    <button onclick="cargarEscena('final')">✨ Final</button>
    <button id="btnSonido">🔊 Sonido</button>
  </nav>

</div>

<script src="app.js"></script>
</body>
</html>
